#cloud-config
package_update: true
packages:
  - nginx

write_files:
  - path: /var/www/html/index.html
    content: |
      <!DOCTYPE html>
      <html lang="de">
      <head>
        <meta charset="UTF-8">
        <title>${server_name}</title>
        <style>
          body { font-family: sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
          h1 { color: #d4232a; }
          .info { background: #f4f4f4; padding: 20px; border-radius: 8px; margin: 20px 0; }
        </style>
      </head>
      <body>
        <h1>${server_name}</h1>
        <div class="info">
          <p><strong>Server Nummer:</strong> ${server_number}</p>
          <p><strong>Provisioniert mit:</strong> Terraform + Hetzner Cloud</p>
          <p><strong>SYT10 — Infrastructure as Code</strong></p>
        </div>
        <p><em>Seite neu laden um Load Balancing zu testen (anderer Server antwortet)</em></p>
      </body>
      </html>

runcmd:
  - systemctl enable nginx
  - systemctl restart nginx
